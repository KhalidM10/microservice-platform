# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (set in a root .env file or your secrets manager):
#   POSTGRES_PASSWORD, SECRET_KEY, RABBITMQ_DEFAULT_PASS, REDIS_PASSWORD,
#   GF_SECURITY_ADMIN_PASSWORD, OPENAI_API_KEY (optional)

services:

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # no insecure default in prod
    ports: []                                    # not reachable outside Docker network
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.50" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  rabbitmq:
    restart: always
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports: []
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    restart: always
    ports: []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits: { memory: 160m, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  document-service:
    restart: always
    environment:
      DEBUG: "false"
      DATABASE_URL: ${DOCUMENT_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log
    ports: []
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.50" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  auth-service:
    restart: always
    environment:
      DEBUG: "false"
      DATABASE_URL: ${AUTH_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log
    ports: []
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  notification-service:
    restart: always
    environment:
      DEBUG: "false"
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log
    ports: []
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  api-gateway:
    restart: always
    environment:
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.50" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    restart: always
    deploy:
      resources:
        limits: { memory: 64m, cpus: "0.10" }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  prometheus:
    restart: always
    ports: []
    deploy:
      resources:
        limits: { memory: 512m, cpus: "0.50" }

  grafana:
    restart: always
    ports: []
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3000}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
